# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
# This is a minimal, known-good configuration for a Next.js app.

# Pin the backend to a specific region.
location: us-central1
backend:
  # The ID of the backend to create or update.
  id: next-server
  # Pin the backend to a specific repository.
  repository: projects/simpliplan-1d51a/locations/us-central1/repositories/firebase-frameworks-nextn
runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
# This minimal configuration allows the framework-aware build to correctly
# configure Next.js routing and serving.
headers:
  - headers:
      - key: "Cache-Control"
        value: "no-store"
rewrites:
  - source: "**"
    function: "next-server"
# Final deployment attempt trigger v6. Aligning all configs to the correct project ID.
